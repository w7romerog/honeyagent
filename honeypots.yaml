# honeypots.yaml
# Configuración declarativa de honeypots. Único tipo implementado en el MVP:
# iam_identity. Los otros tres quedan documentados con enabled: false.
#
# Campos comunes:
#   type        → iam_identity | s3_bucket | secrets_manager | rds_endpoint
#   name        → identificador del honeypot
#   enabled     → si se aprovisiona en infra/
#   description → contexto para el reporte del agente
#   config      → parámetros específicos del tipo

honeypots:

  # Honeypot de identidad (IAM) — implementado
  - type: iam_identity
    name: hp-billing-readonly
    enabled: true
    description: >
      Usuario IAM señuelo que simula una cuenta de automatización de solo lectura
      para facturación. Cualquier actividad con sus credenciales indica que fueron
      comprometidas.
    username: billing-readonly
    config:
      attach_policy_arn: "arn:aws:iam::aws:policy/ReadOnlyAccess"
      create_access_key: true
      tags:
        Purpose: honeypot
        HoneyAgent: "true"
    alerts:
      on_events:
        - "*"

  # S3 Bucket — documentado, no implementado
  - type: s3_bucket
    name: hp-fake-credentials-bucket
    enabled: false
    description: >
      Bucket con objetos que simulan credenciales y dumps de base de datos.
      Cualquier GetObject/ListBucket sería señal de reconocimiento o exfiltración.
    config:
      objects:
        - key: "credentials/aws_keys_backup.csv"
          content: "FAKE_ACCESS_KEY,FAKE_SECRET_KEY"
        - key: "db/prod_dump.sql.gz"
          content: "-- FAKE DATABASE DUMP --"
      block_public_access: true
      versioning: false
    alerts:
      on_events:
        - GetObject
        - PutObject
        - DeleteObject
        - ListBucket

  # Secrets Manager — documentado, no implementado
  - type: secrets_manager
    name: hp-prod-db-password
    enabled: false
    description: >
      Secret falso que simula la contraseña maestra de la base de datos de
      producción.
    config:
      secret_value: "FAKE_SUPER_SECRET_PASSWORD_DO_NOT_USE"
      description: "prod/database/master - DO NOT DELETE"
    alerts:
      on_events:
        - GetSecretValue
        - DescribeSecret
        - DeleteSecret
        - PutSecretValue

  # RDS Endpoint — documentado, no implementado
  - type: rds_endpoint
    name: hp-prod-db-endpoint
    enabled: false
    description: >
      Endpoint RDS señuelo que simula la base de datos de producción.
    config:
      engine: postgres
      instance_class: db.t3.micro
      db_name: "prod_customers"
    alerts:
      on_events:
        - DescribeDBInstances
        - ModifyDBInstance
        - "AuthenticateDatabaseAccess"

# Pipeline de detección
detection:
  audit_source: cloudtrail
  routing_engine: eventbridge
  executor: lambda
  complementary_layer:
    name: guardduty
    enabled: false

# Configuración del agente LLM
agent:
  model_env_var: AGENT_MODEL
  tools:
    - lookup_ip_reputation
  output_format: markdown+json
  reports_bucket: "honeyagent-reports-${account_id}"
