# honeypots.yaml
# Configuración declarativa de los honeypots desplegados en AWS.
#
# Cada entrada define un recurso AWS "trampa" diseñado para atraer actividad
# maliciosa. El agente LLM monitorea accesos a estos recursos y responde
# automáticamente analizando el contexto del evento con herramientas de AWS.
#
# Campos comunes:
#   name        → nombre del recurso en AWS (también usado como ID interno)
#   type        → tipo de honeypot (define qué recurso Terraform crea)
#   enabled     → permite deshabilitar sin borrar la config
#   severity    → niveles: low | medium | high | critical
#   description → explicación para el reporte del agente
#   config      → parámetros específicos del tipo de honeypot
#   alerts      → qué eventos de CloudTrail disparan al agente

honeypots:

  # ── S3 Bucket honeypot ──────────────────────────────────────────────────────
  # Simula un bucket con datos sensibles (credenciales, backups, configs).
  # En producción legítima nadie debería acceder a este bucket.
  # Cualquier GetObject / ListBucket es señal de reconocimiento o exfiltración.
  - name: hp-fake-credentials-bucket
    type: s3_bucket
    enabled: true
    severity: high
    description: "Bucket con objetos que simulan credenciales y dumps de base de datos"
    config:
      # Objetos señuelo con nombres atractivos para atacantes
      objects:
        - key: "credentials/aws_keys_backup.csv"
          content: "FAKE_ACCESS_KEY,FAKE_SECRET_KEY"
        - key: "db/prod_dump_2024.sql.gz"
          content: "-- FAKE DATABASE DUMP --"
        - key: "config/terraform.tfvars"
          content: "# FAKE TERRAFORM VARS"
      block_public_access: true   # no es público; cualquier acceso = insider o compromiso
      versioning: false
    alerts:
      on_events:
        - GetObject
        - PutObject
        - DeleteObject
        - ListBucket

  # ── IAM User honeypot ────────────────────────────────────────────────────────
  # Usuario IAM inactivo con nombre atractivo ("admin", "backup").
  # No debe autenticarse nunca. Cualquier uso de sus credenciales indica
  # que alguien encontró sus access keys (fuga de secretos, credential stuffing, etc.)
  - name: hp-admin-backup-user
    type: iam_user
    enabled: true
    severity: critical
    description: "Usuario IAM inactivo que simula una cuenta de administrador de respaldo"
    config:
      create_access_key: true      # key generada y guardada en Secrets Manager (no en código)
      attach_policies:
        - arn:aws:iam::aws:policy/ReadOnlyAccess   # permisos reales pero de solo lectura
      tags:
        Purpose: "honeypot"
        HoneyAgent: "true"
    alerts:
      on_events:
        - ConsoleLogin
        - AssumeRole
        - CreateAccessKey
        - "*"    # cualquier llamada API con estas credenciales es sospechosa

  # ── Secrets Manager honeypot ─────────────────────────────────────────────────
  # Secret con nombre llamativo (simula password de producción).
  # Un GetSecretValue en este secret indica post-compromiso: el atacante
  # ya tiene acceso a la cuenta y está buscando credenciales de base de datos.
  - name: hp-prod-db-password
    type: secrets_manager_secret
    enabled: true
    severity: high
    description: "Secret falso que simula la contraseña maestra de la base de datos de producción"
    config:
      secret_value: "FAKE_SUPER_SECRET_PASSWORD_DO_NOT_USE_honeyagent"
      description: "prod/database/master - DO NOT DELETE"
    alerts:
      on_events:
        - GetSecretValue
        - DescribeSecret
        - DeleteSecret
        - PutSecretValue

  # ── CloudTrail tampering monitor ─────────────────────────────────────────────
  # No crea un recurso nuevo; monitorea el trail existente.
  # StopLogging / DeleteTrail son las primeras acciones de un atacante avanzado
  # que quiere eliminar evidencia. Severidad crítica: indica compromiso activo.
  - name: hp-cloudtrail-tampering
    type: cloudtrail_monitor
    enabled: true
    severity: critical
    description: "Detecta intentos de deshabilitar o borrar CloudTrail (táctica de evasión post-compromiso)"
    config: {}
    alerts:
      on_events:
        - StopLogging
        - DeleteTrail
        - UpdateTrail
        - PutEventSelectors
        - DeleteEventDataStore

# ── Configuración global del framework ─────────────────────────────────────────
settings:
  aws_region: "us-east-1"

  # Nombre del trail de CloudTrail creado por Terraform
  cloudtrail_name: "honeyagent-trail"

  # Bucket donde CloudTrail escribe los logs (creado por Terraform)
  log_bucket: "honeyagent-logs-${account_id}"   # el account_id se resuelve en Terraform

  # Modelo de Claude usado por el agente LLM
  # claude-haiku-4-5 para demos rápidas / claude-sonnet-4-6 para análisis completo
  agent_model: "claude-sonnet-4-6"

  # Tiempo mínimo entre alertas del mismo origen (evita spam por el mismo IP/usuario)
  alert_cooldown_minutes: 15

  # Nombre del secret en Secrets Manager que contiene el webhook de Slack
  # El valor real se configura manualmente en AWS, nunca en este archivo
  slack_webhook_secret: "honeyagent/slack/webhook"
