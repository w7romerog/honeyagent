[pytest]
# Directorio de tests
testpaths = tests

# Marcadores personalizados
markers =
    unit: Tests unitarios sin dependencias externas (AWS, Claude API, AbuseIPDB)
    integration: Tests que llaman a la Claude API real (requiere ANTHROPIC_API_KEY)

# Mostrar output de print() durante los tests
addopts = -v --tb=short

# Variables de entorno para todos los tests
env =
    HONEYAGENT_MOCK=true
